<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Regras · OpenFinance</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%99%EF%B8%8F%3C/text%3E%3C/svg%3E" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <style>
      body { font-feature-settings: 'cv11', 'ss01'; -webkit-font-smoothing: antialiased; }
      .tabular { font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans min-h-screen" style="color-scheme:light">

    <aside class="fixed inset-y-0 left-0 w-56 bg-white border-r border-slate-200 flex flex-col z-30">
      <div class="px-5 h-16 flex items-center border-b border-slate-100 shrink-0">
        <a href="/" class="flex items-center gap-3 min-w-0">
          <span class="size-8 bg-indigo-600 rounded-xl flex items-center justify-center text-white text-base select-none shrink-0">💳</span>
          <span class="font-bold text-slate-900 text-sm truncate">OpenFinance</span>
        </a>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
        <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">📊</span>
          Dashboard
        </a>
        <a href="/historico" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">📚</span>
          Histórico
        </a>
        <a href="/proximos" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">📅</span>
          Próximos
        </a>

        <a href="/custos-fixos" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">📌</span>
          Planejamento
        </a>
        <a href="/regras" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium bg-indigo-50 text-indigo-700">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">⚙️</span>
          Regras
        </a>
      </nav>
    </aside>

    <div class="ml-56 min-h-screen flex flex-col">
      <header class="bg-white border-b border-slate-200 px-8 h-16 flex items-center justify-between gap-4 shrink-0">
        <div class="min-w-0">
          <h1 class="text-lg font-bold text-slate-900">Regras</h1>
          <p class="text-xs text-slate-500 truncate" id="subtitle">Carregando…</p>
        </div>
      </header>

      <div id="toast" class="hidden fixed top-4 right-4 z-50 max-w-sm rounded-xl text-white text-sm px-4 py-3 shadow-lg"></div>

      <main class="flex-1 px-8 py-6 space-y-6 max-w-5xl">

        <!-- Descrição → categoria -->
        <section class="bg-white rounded-2xl border border-slate-200 p-6">
          <div class="flex items-baseline justify-between mb-1">
            <h2 class="text-base font-semibold text-slate-900">Descrição → categoria</h2>
            <span class="text-xs text-slate-500" id="desc-cat-count">—</span>
          </div>
          <p class="text-xs text-slate-500 mb-4">Quando a descrição da transação contém o padrão, ela é categorizada conforme a regra.</p>

          <form id="desc-cat-form" class="flex flex-col sm:flex-row gap-2 mb-4">
            <input id="desc-cat-pattern" type="text" required placeholder="Padrão na descrição (ex: Uber)" class="flex-1 text-sm rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100" />
            <select id="desc-cat-category" required class="text-sm rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100"></select>
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg px-4 py-2">Adicionar</button>
          </form>

          <div class="rounded-xl border border-slate-200 bg-slate-50 p-4 mb-5">
            <div class="flex flex-wrap items-baseline justify-between gap-2 mb-3">
              <div>
                <h3 class="text-sm font-semibold text-slate-900">Sugestões por repetição</h3>
                <p class="text-xs text-slate-500 mt-0.5">Descrições recorrentes sem regra ainda.</p>
              </div>
              <button id="desc-cat-suggestions-refresh" type="button" class="text-xs font-medium text-slate-600 hover:text-slate-900 bg-white border border-slate-200 hover:bg-slate-100 rounded-lg px-3 py-1.5 transition-colors">Atualizar</button>
            </div>
            <ul id="desc-cat-suggestions" class="space-y-2 text-sm"></ul>
          </div>

          <ul id="desc-cat-list" class="divide-y divide-slate-100 text-sm"></ul>
        </section>

      </main>
    </div>

    <script src="/static/regras.js?v=3"></script>
  </body>
</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Histórico · OpenFinance</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%8A%3C/text%3E%3C/svg%3E" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <style>
      body {
        font-feature-settings: 'cv11', 'ss01';
        -webkit-font-smoothing: antialiased;
      }
      .tabular {
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans">
    <div class="mx-auto max-w-6xl px-6 py-10">
      <header class="flex items-center justify-between mb-10 gap-4">
        <div>
          <nav class="flex items-center gap-4 text-sm mb-3">
            <a href="/" class="text-slate-500 hover:text-slate-900">Dashboard</a>
            <span class="text-slate-300">/</span>
            <span class="text-slate-900 font-medium">Histórico</span>
            <span class="text-slate-300">/</span>
            <a href="/proximos" class="text-slate-500 hover:text-slate-900">Próximos</a>
            <span class="text-slate-300">/</span>
            <a href="/orcamento" class="text-slate-500 hover:text-slate-900">Orçamento</a>
          </nav>
          <h1 class="text-3xl font-bold tracking-tight">Histórico</h1>
          <p class="text-sm text-slate-500 mt-1" id="subtitle">Carregando…</p>
        </div>
        <button
          id="refresh"
          class="text-sm font-medium text-slate-600 hover:text-slate-900 inline-flex items-center gap-1.5"
          title="Recarregar dados"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="size-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M4 4v5h5M20 20v-5h-5M5 9a8 8 0 0114-3M19 15a8 8 0 01-14 3"
            />
          </svg>
          Atualizar
        </button>
      </header>

      <div id="history-tabs" class="flex flex-wrap gap-2 mb-6"></div>

      <section id="cards" class="grid grid-cols-1 lg:grid-cols-2 gap-4"></section>
      <section id="invoices" class="hidden space-y-4"></section>

      <div id="empty" class="hidden text-center py-16">
        <p class="text-slate-500">Nenhuma transação encontrada.</p>
        <p class="text-sm text-slate-400 mt-1">
          Conecte um banco no <a href="/" class="text-indigo-600 hover:text-indigo-700">dashboard</a> primeiro.
        </p>
      </div>
    </div>

    <div
      id="drilldown"
      class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40"
    >
      <div
        class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[85vh] flex flex-col"
        role="dialog"
        aria-modal="true"
      >
        <header class="flex items-start justify-between gap-4 p-6 border-b border-slate-100">
          <div class="min-w-0">
            <div class="flex items-center gap-2 mb-1">
              <span
                id="drilldown-color"
                class="inline-block size-3 rounded-full shrink-0"
              ></span>
              <h2
                id="drilldown-title"
                class="text-lg font-semibold text-slate-900 truncate"
              ></h2>
            </div>
            <p id="drilldown-subtitle" class="text-sm text-slate-500"></p>
          </div>
          <button
            id="drilldown-close"
            class="shrink-0 text-slate-400 hover:text-slate-900"
            aria-label="Fechar"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="size-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </header>
        <div id="drilldown-body" class="overflow-y-auto"></div>
      </div>
    </div>

    <script src="/static/historico.js?v=20260524-1"></script>
  </body>
</html>

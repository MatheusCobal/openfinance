<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Histórico · OpenFinance</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%8A%3C/text%3E%3C/svg%3E" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <style>
      body { font-feature-settings: 'cv11', 'ss01'; -webkit-font-smoothing: antialiased; }
      .tabular { font-variant-numeric: tabular-nums; }
      details > summary { list-style: none; }
      details > summary::-webkit-details-marker { display: none; }
      details[open] .chevron { transform: rotate(90deg); }
      .chevron { transition: transform 0.15s ease; }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans min-h-screen" style="color-scheme:light">

    <!-- ── Sidebar ──────────────────────────────────────────────── -->
    <aside class="fixed inset-y-0 left-0 w-56 bg-white border-r border-slate-200 flex flex-col z-30">
      <div class="px-5 h-16 flex items-center border-b border-slate-100 shrink-0">
        <a href="/" class="flex items-center gap-3 min-w-0">
          <span class="size-8 bg-indigo-600 rounded-xl flex items-center justify-center text-white text-base select-none shrink-0">💳</span>
          <span class="font-bold text-slate-900 text-sm truncate">OpenFinance</span>
        </a>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
        <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">📊</span>
          Dashboard
        </a>
        <a href="/historico" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium bg-indigo-50 text-indigo-700">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">📚</span>
          Histórico
        </a>
        <a href="/proximos" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">📅</span>
          Próximos
        </a>
        <a href="/orcamento" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">🎯</span>
          Orçamento
        </a>
        <a href="/receita-futura" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">💰</span>
          Receita futura
        </a>
        <a href="/custos-fixos" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">📌</span>
          Custos fixos
        </a>
        <a href="/regras" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">⚙️</span>
          Regras
        </a>
      </nav>
    </aside>

    <!-- ── Page shell (right of sidebar) ───────────────────────── -->
    <div class="ml-56 min-h-screen flex flex-col">

      <!-- Top bar -->
      <header class="bg-white border-b border-slate-200 px-8 h-16 flex items-center justify-between gap-4 shrink-0">
        <div class="min-w-0">
          <h1 class="text-lg font-bold text-slate-900">Histórico</h1>
          <p class="text-xs text-slate-500 truncate" id="subtitle">Carregando…</p>
        </div>
        <div class="flex items-center gap-1.5 shrink-0">
          <button
            id="refresh"
            class="text-sm font-medium text-slate-600 hover:text-slate-900 inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg hover:bg-slate-100 transition-colors"
            title="Recarregar dados"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M20 20v-5h-5M5 9a8 8 0 0114-3M19 15a8 8 0 01-14 3" />
            </svg>
            Atualizar
          </button>
        </div>
      </header>

      <!-- Toast -->
      <div id="toast" class="hidden fixed top-4 right-4 z-50 max-w-sm rounded-xl text-white text-sm px-4 py-3 shadow-xl"></div>

      <!-- Content -->
      <main class="flex-1 px-8 py-6">
        <div id="history-tabs" class="flex flex-wrap gap-2 mb-6"></div>

        <section id="cards" class="grid grid-cols-1 lg:grid-cols-2 gap-4"></section>
        <section id="invoices" class="hidden space-y-4"></section>
        <section id="income-tab" class="hidden space-y-4"></section>
        <section id="cashflow-tab" class="hidden space-y-4"></section>

        <div id="empty" class="hidden text-center py-16">
          <p class="text-slate-500">Nenhuma transação encontrada.</p>
          <p class="text-sm text-slate-400 mt-1">
            Conecte um banco no <a href="/" class="text-indigo-600 hover:text-indigo-700">dashboard</a> primeiro.
          </p>
        </div>
      </main>
    </div>

    <!-- Drilldown modal -->
    <div
      id="drilldown"
      class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40"
    >
      <div
        class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[85vh] flex flex-col"
        role="dialog"
        aria-modal="true"
      >
        <header class="flex items-start justify-between gap-4 p-6 border-b border-slate-100">
          <div class="min-w-0">
            <div class="flex items-center gap-2 mb-1">
              <span id="drilldown-color" class="inline-block size-3 rounded-full shrink-0"></span>
              <h2 id="drilldown-title" class="text-lg font-semibold text-slate-900 truncate"></h2>
            </div>
            <p id="drilldown-subtitle" class="text-sm text-slate-500"></p>
          </div>
          <button
            id="drilldown-close"
            class="shrink-0 text-slate-400 hover:text-slate-900"
            aria-label="Fechar"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="size-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </header>
        <div id="drilldown-body" class="overflow-y-auto"></div>
      </div>
    </div>

    <script src="/static/historico.js?v=20260525-6"></script>
  </body>
</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Dashboard · OpenFinance</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%8A%3C/text%3E%3C/svg%3E" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: { extend: { fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] } } },
      };
    </script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="/static/styles.css" />
    <style>
      body { font-feature-settings: 'cv11', 'ss01'; -webkit-font-smoothing: antialiased; }
      .tabular { font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans min-h-screen" style="color-scheme:light">

    <aside class="fixed inset-y-0 left-0 w-56 bg-slate-900 flex flex-col z-30">
      <div class="px-5 h-16 flex items-center border-b border-white/10 shrink-0">
        <a href="/" class="flex items-center gap-2.5 min-w-0">
          <span class="size-7 bg-blue-600 rounded flex items-center justify-center text-white text-xs font-bold tracking-tight select-none shrink-0">OF</span>
          <span class="font-semibold text-white text-sm truncate">OpenFinance</span>
        </a>
      </div>
      <nav class="sidebar-scroll flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
        <a href="/dashboard" class="flex items-center gap-2.5 px-2.5 py-2 rounded-md text-sm font-medium bg-slate-800 text-white">
          <svg class="size-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
          Dashboard
        </a>
        <a href="/planejamento" class="flex items-center gap-2.5 px-2.5 py-2 rounded-md text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-slate-100 transition-colors">
          <svg class="size-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><path d="M9 12h6M9 16h4"/></svg>
          Planejamento
        </a>
        <a href="/proximos" class="flex items-center gap-2.5 px-2.5 py-2 rounded-md text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-slate-100 transition-colors">
          <svg class="size-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Próximos
        </a>
        <a href="/historico" class="flex items-center gap-2.5 px-2.5 py-2 rounded-md text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-slate-100 transition-colors">
          <svg class="size-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
          Histórico
        </a>
        <a href="/regras" class="flex items-center gap-2.5 px-2.5 py-2 rounded-md text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-slate-100 transition-colors">
          <svg class="size-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
          Regras
        </a>
      </nav>
    </aside>

    <div class="ml-56 min-h-screen flex flex-col">
      <header class="bg-white border-b border-slate-200 px-8 h-16 flex items-center justify-between gap-4 shrink-0">
        <div class="min-w-0">
          <h1 class="text-lg font-bold text-slate-900">Dashboard</h1>
          <p class="text-xs text-slate-500 truncate" id="header-date">Carregando…</p>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <button id="btn-refresh" type="button"
            class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md border border-slate-200 bg-white text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors">
            <svg class="size-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v5h5M20 20v-5h-5M5 9a8 8 0 0114-3M19 15a8 8 0 01-14 3"/></svg>
            Atualizar
          </button>
          <button id="btn-connect" type="button"
            class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-blue-700 text-sm font-medium text-white hover:bg-blue-800 transition-colors disabled:opacity-60">
            <svg class="size-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Conectar banco
          </button>
        </div>
      </header>

      <div id="toast" class="hidden fixed top-4 right-4 z-50 max-w-sm rounded-md text-white text-sm px-4 py-3 shadow-lg"></div>

      <main class="flex-1 px-8 py-6 max-w-7xl w-full">

        <!-- Loading state -->
        <div id="loading" class="flex items-center justify-center py-20 text-slate-400 text-sm">
          Carregando dados…
        </div>

        <!-- Error state -->
        <div id="error-state" class="hidden flex items-center justify-center py-20">
          <div class="text-center">
            <p class="text-slate-500 text-sm mb-3">Não foi possível carregar os dados do dashboard.</p>
            <button onclick="loadData()" class="text-sm font-medium text-indigo-600 hover:text-indigo-700">Tentar novamente</button>
          </div>
        </div>

        <!-- Dashboard content -->
        <div id="dashboard-content" class="hidden space-y-6">

          <!-- A. Hero: DISPONÍVEL PARA GASTAR -->
          <div id="hero-card" class="bg-slate-900 rounded-lg p-6 text-white"></div>

          <!-- B. Credit card invoice + reconciliation -->
          <div class="bg-white rounded-lg border border-slate-200 p-6">
            <div id="invoice-card-content"></div>
            <div id="invoice-reconciliation" class="hidden mt-4 pt-4 border-t border-slate-100"></div>
          </div>

          <!-- B2. Saldo em banco -->
          <div id="bank-balance-card" class="bg-white rounded-lg border border-slate-200 p-6"></div>

          <!-- C & D. Resumo do mês + summary cards -->
          <section>
            <div class="flex items-baseline justify-between mb-4">
              <h2 class="text-base font-semibold text-slate-900">Resumo do mês</h2>
              <span class="text-sm text-slate-500" id="month-compact">—</span>
            </div>
            <div id="summary-cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
          </section>

          <!-- E. Compras por categoria -->
          <section>
            <h2 class="text-base font-semibold text-slate-900 mb-4">Compras por categoria</h2>
            <div id="categories-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3"></div>
          </section>

        </div>
      </main>
    </div>

    <!-- Category detail modal -->
    <div id="category-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
      <div id="category-modal-backdrop" class="absolute inset-0 bg-black/40"></div>
      <div class="relative bg-white rounded-lg shadow-xl w-full max-w-lg max-h-[80vh] flex flex-col">
        <div class="flex items-start justify-between px-6 py-4 border-b border-slate-200 shrink-0">
          <div class="min-w-0 pr-4">
            <h2 id="modal-category-name" class="text-base font-semibold text-slate-900 truncate"></h2>
            <p id="modal-category-subtitle" class="text-sm text-slate-500 mt-0.5"></p>
          </div>
          <button id="modal-close-btn" type="button"
            class="size-7 rounded-md flex items-center justify-center text-slate-400 hover:text-slate-700 hover:bg-slate-100 transition-colors shrink-0">
            <svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div id="modal-transactions-list" class="overflow-y-auto flex-1 px-6 py-4"></div>
      </div>
    </div>

    <script src="/static/planning_common.js?v=1"></script>
    <!-- Pluggy Connect SDK — carregado diretamente para garantir window.PluggyConnect
         antes de dashboard.js executar. O loader dinâmico em dashboard.js serve de
         fallback caso esta tag seja bloqueada por CSP ou adblocker. -->
    <script src="https://cdn.pluggy.ai/pluggy-connect/latest/pluggy-connect.js"></script>
    <script src="/static/dashboard.js?v=14"></script>
  </body>
</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Dashboard · OpenFinance</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%8A%3C/text%3E%3C/svg%3E" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: { extend: { fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] } } },
      };
    </script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <style>
      body { font-feature-settings: 'cv11', 'ss01'; -webkit-font-smoothing: antialiased; }
      .tabular { font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans min-h-screen" style="color-scheme:light">

    <aside class="fixed inset-y-0 left-0 w-56 bg-white border-r border-slate-200 flex flex-col z-30">
      <div class="px-5 h-16 flex items-center border-b border-slate-100 shrink-0">
        <a href="/" class="flex items-center gap-3 min-w-0">
          <span class="size-8 bg-indigo-600 rounded-xl flex items-center justify-center text-white text-base select-none shrink-0">💳</span>
          <span class="font-bold text-slate-900 text-sm truncate">OpenFinance</span>
        </a>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
        <a href="/dashboard" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium bg-indigo-50 text-indigo-700">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">📊</span>
          Dashboard
        </a>
        <a href="/planejamento" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">📌</span>
          Planejamento
        </a>
        <a href="/proximos" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">📅</span>
          Próximos
        </a>
        <a href="/historico" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">📚</span>
          Histórico
        </a>
        <a href="/regras" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">⚙️</span>
          Regras
        </a>
      </nav>
    </aside>

    <div class="ml-56 min-h-screen flex flex-col">
      <header class="bg-white border-b border-slate-200 px-8 h-16 flex items-center justify-between gap-4 shrink-0">
        <div class="min-w-0">
          <h1 class="text-lg font-bold text-slate-900">Dashboard</h1>
          <p class="text-xs text-slate-500 truncate" id="header-date">Carregando…</p>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <button id="btn-refresh" type="button"
            class="inline-flex items-center gap-1.5 px-3 py-2 rounded-lg border border-slate-200 bg-white text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">
            <span class="text-base leading-none">↻</span>
            Atualizar
          </button>
          <button id="btn-connect" type="button"
            class="inline-flex items-center gap-1.5 px-3 py-2 rounded-lg bg-indigo-600 text-sm font-medium text-white hover:bg-indigo-700 transition-colors disabled:opacity-60">
            <span class="text-base leading-none">+</span>
            Conectar banco
          </button>
        </div>
      </header>

      <div id="toast" class="hidden fixed top-4 right-4 z-50 max-w-sm rounded-xl text-white text-sm px-4 py-3 shadow-lg"></div>

      <main class="flex-1 px-8 py-6 max-w-7xl w-full">

        <!-- Loading state -->
        <div id="loading" class="flex items-center justify-center py-20 text-slate-400 text-sm">
          Carregando dados…
        </div>

        <!-- Error state -->
        <div id="error-state" class="hidden flex items-center justify-center py-20">
          <div class="text-center">
            <p class="text-slate-500 text-sm mb-3">Não foi possível carregar os dados do dashboard.</p>
            <button onclick="loadData()" class="text-sm font-medium text-indigo-600 hover:text-indigo-700">Tentar novamente</button>
          </div>
        </div>

        <!-- Dashboard content -->
        <div id="dashboard-content" class="hidden space-y-6">

          <!-- A. Hero: DISPONÍVEL PARA GASTAR -->
          <div id="hero-card" class="bg-indigo-600 rounded-2xl p-6 text-white min-h-[140px]"></div>

          <!-- B. Credit card invoice -->
          <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
            <div id="invoice-card-content"></div>
          </div>

          <!-- C & D. Resumo do mês + summary cards -->
          <section>
            <div class="flex items-baseline justify-between mb-4">
              <h2 class="text-base font-semibold text-slate-900">Resumo do mês</h2>
              <span class="text-sm text-slate-500" id="month-compact">—</span>
            </div>
            <div id="summary-cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
          </section>

          <!-- E. Compras por categoria -->
          <section>
            <h2 class="text-base font-semibold text-slate-900 mb-4">Compras por categoria</h2>
            <div id="categories-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3"></div>
          </section>

        </div>
      </main>
    </div>

    <script src="/static/dashboard.js?v=1"></script>
  </body>
</html>

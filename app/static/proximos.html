<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Próximos · OpenFinance</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%8F%AD%3C/text%3E%3C/svg%3E" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <style>
      body {
        font-feature-settings: 'cv11', 'ss01';
        -webkit-font-smoothing: antialiased;
      }
      .tabular {
        font-variant-numeric: tabular-nums;
      }
      details > summary {
        list-style: none;
        cursor: pointer;
      }
      details > summary::-webkit-details-marker {
        display: none;
      }
      details[open] .chevron {
        transform: rotate(90deg);
      }
      .chevron {
        transition: transform 0.15s ease;
      }
      /* Horizontal-scrolling chip strip without an ugly scrollbar */
      .chip-strip {
        scrollbar-width: thin;
      }
      .chip-strip::-webkit-scrollbar {
        height: 6px;
      }
      .chip-strip::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 3px;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans">
    <div class="mx-auto max-w-6xl px-6 py-10">
      <header class="flex items-center justify-between mb-8 gap-4">
        <div>
          <nav class="flex items-center gap-4 text-sm mb-3">
            <a href="/" class="text-slate-500 hover:text-slate-900">Dashboard</a>
            <span class="text-slate-300">/</span>
            <a href="/historico" class="text-slate-500 hover:text-slate-900">Histórico</a>
            <span class="text-slate-300">/</span>
            <span class="text-slate-900 font-medium">Próximos</span>
            <span class="text-slate-300">/</span>
            <a href="/orcamento" class="text-slate-500 hover:text-slate-900">Orçamento</a>
          </nav>
          <h1 class="text-3xl font-bold tracking-tight">Próximos gastos</h1>
          <p class="text-sm text-slate-500 mt-1" id="subtitle">Carregando…</p>
        </div>
        <button
          id="refresh"
          class="text-sm font-medium text-slate-600 hover:text-slate-900 inline-flex items-center gap-1.5"
          title="Recarregar dados"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="size-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M4 4v5h5M20 20v-5h-5M5 9a8 8 0 0114-3M19 15a8 8 0 01-14 3"
            />
          </svg>
          Atualizar
        </button>
      </header>

      <section id="overview" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
          <p class="text-xs uppercase tracking-wider text-slate-500 font-medium">Próxima fatura</p>
          <p class="mt-2 text-2xl font-bold tabular" id="summary-next-total">—</p>
          <p class="text-xs text-slate-500 mt-1" id="summary-next-label">—</p>
        </div>
        <div class="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
          <p class="text-xs uppercase tracking-wider text-slate-500 font-medium">3 meses</p>
          <p class="mt-2 text-2xl font-bold tabular" id="summary-quarter-total">—</p>
          <p class="text-xs text-slate-500 mt-1" id="summary-quarter-count">—</p>
        </div>
        <div class="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
          <p class="text-xs uppercase tracking-wider text-slate-500 font-medium">Total futuro</p>
          <p class="mt-2 text-2xl font-bold tabular" id="summary-future-total">—</p>
          <p class="text-xs text-slate-500 mt-1" id="summary-future-count">—</p>
        </div>
        <div class="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
          <p class="text-xs uppercase tracking-wider text-slate-500 font-medium">Maior fatura</p>
          <p class="mt-2 text-2xl font-bold tabular" id="summary-largest-total">—</p>
          <p class="text-xs text-slate-500 mt-1" id="summary-largest-label">—</p>
        </div>
      </section>

      <section id="month-chart-panel" class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm mb-6">
        <h2 class="font-semibold text-slate-900 mb-4">Próximos meses</h2>
        <div class="relative h-64">
          <canvas id="month-chart"></canvas>
        </div>
      </section>

      <div
        id="chip-strip"
        class="chip-strip flex gap-2 overflow-x-auto pb-2 mb-6"
      ></div>

      <div
        id="month-summary"
        class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm mb-6 hidden"
      >
        <div class="flex items-baseline justify-between">
          <div>
            <p class="text-xs uppercase tracking-wider text-slate-500 font-medium" id="month-label">—</p>
            <p class="mt-1 text-3xl font-bold tabular" id="month-total">—</p>
          </div>
          <p class="text-sm text-slate-500 tabular" id="month-count">—</p>
        </div>
      </div>

      <section id="categories" class="space-y-3"></section>

      <div id="empty" class="hidden text-center py-16">
        <p class="text-slate-500">Nenhuma parcela futura encontrada.</p>
        <p class="text-sm text-slate-400 mt-1">
          Você está em dia ou ainda não conectou contas com parcelamento.
        </p>
      </div>
    </div>

  <script src="/static/proximos.js?v=20260524-2"></script>
</body>
</html>

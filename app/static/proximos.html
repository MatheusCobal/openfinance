      details > summary { list-style: none; cursor: pointer; }
      details > summary::-webkit-details-marker { display: none; }
      details[open] .chevron { transform: rotate(90deg); }
      .chevron { transition: transform 0.15s ease; }
      .chip-strip { scrollbar-width: thin; }
      .chip-strip::-webkit-scrollbar { height: 6px; }
      .chip-strip::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 3px; }
    </style>

    <!-- ── Page shell (right of sidebar) ───────────────────────── -->
    <div class="ml-56 min-h-screen flex flex-col">

      <!-- Top bar -->
      <header class="bg-white border-b border-slate-200 px-8 h-16 flex items-center justify-between gap-4 shrink-0">
        <div class="min-w-0">
          <h1 class="text-lg font-bold text-slate-900">Próximos gastos</h1>
          <p class="text-xs text-slate-500 truncate" id="subtitle">Carregando…</p>
        </div>
        <div class="flex items-center gap-1.5 shrink-0">
          <button id="refresh"
            class="text-sm font-medium text-slate-600 hover:text-slate-900 inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg hover:bg-slate-100 transition-colors"
            title="Recarregar dados">
            <svg xmlns="http://www.w3.org/2000/svg" class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M20 20v-5h-5M5 9a8 8 0 0114-3M19 15a8 8 0 01-14 3" />
            </svg>
            Atualizar
          </button>
        </div>
      </header>

      <!-- Content -->
      <main class="flex-1 px-8 py-6">

        <section id="overview" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
          <div class="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
            <p class="text-xs uppercase tracking-wider text-slate-500 font-medium">Próxima fatura</p>
            <p class="mt-2 text-2xl font-bold tabular" id="summary-next-total">—</p>
            <p class="text-xs text-slate-500 mt-1" id="summary-next-label">—</p>
          </div>
          <div class="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
            <p class="text-xs uppercase tracking-wider text-slate-500 font-medium">3 meses</p>
            <p class="mt-2 text-2xl font-bold tabular" id="summary-quarter-total">—</p>
            <p class="text-xs text-slate-500 mt-1" id="summary-quarter-count">—</p>
          </div>
          <div class="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
            <p class="text-xs uppercase tracking-wider text-slate-500 font-medium">Total futuro</p>
            <p class="mt-2 text-2xl font-bold tabular" id="summary-future-total">—</p>
            <p class="text-xs text-slate-500 mt-1" id="summary-future-count">—</p>
          </div>
          <div class="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
            <p class="text-xs uppercase tracking-wider text-slate-500 font-medium">Maior fatura</p>
            <p class="mt-2 text-2xl font-bold tabular" id="summary-largest-total">—</p>
            <p class="text-xs text-slate-500 mt-1" id="summary-largest-label">—</p>
          </div>
        </section>

        <section id="month-chart-panel" class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm mb-6">
          <h2 class="font-semibold text-slate-900 mb-4">Próximos meses</h2>
          <div class="relative h-64">
            <canvas id="month-chart"></canvas>
          </div>
        </section>

        <div id="chip-strip" class="chip-strip flex gap-2 overflow-x-auto pb-2 mb-6"></div>

        <div
          id="month-summary"
          class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm mb-6 hidden"
        >
          <div class="flex items-baseline justify-between">
            <div>
              <p class="text-xs uppercase tracking-wider text-slate-500 font-medium" id="month-label">—</p>
              <p class="mt-1 text-3xl font-bold tabular" id="month-total">—</p>
            </div>
            <p class="text-sm text-slate-500 tabular" id="month-count">—</p>
          </div>
        </div>

        <section id="categories" class="space-y-3"></section>

        <div id="empty" class="hidden text-center py-16">
          <p class="text-slate-500">Nenhuma parcela futura encontrada.</p>
          <p class="text-sm text-slate-400 mt-1">
            Você está em dia ou ainda não conectou contas com parcelamento.
          </p>
        </div>
      </main>
    </div>

    <script src="/static/proximos.js?v=20260525-1"></script>
  </body>
</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Orçamento · OpenFinance</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%AF%3C/text%3E%3C/svg%3E" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <style>
      body { font-feature-settings: 'cv11', 'ss01'; -webkit-font-smoothing: antialiased; }
      .tabular { font-variant-numeric: tabular-nums; }
      .bar { transition: width 0.4s ease; }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans min-h-screen" style="color-scheme:light">

    <!-- ── Sidebar ──────────────────────────────────────────────── -->
    <aside class="fixed inset-y-0 left-0 w-56 bg-white border-r border-slate-200 flex flex-col z-30">
      <div class="px-5 h-16 flex items-center border-b border-slate-100 shrink-0">
        <a href="/" class="flex items-center gap-3 min-w-0">
          <span class="size-8 bg-indigo-600 rounded-xl flex items-center justify-center text-white text-base select-none shrink-0">💳</span>
          <span class="font-bold text-slate-900 text-sm truncate">OpenFinance</span>
        </a>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
        <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">📊</span>
          Dashboard
        </a>
        <a href="/historico" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">📚</span>
          Histórico
        </a>
        <a href="/proximos" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">📅</span>
          Próximos
        </a>
        <a href="/orcamento" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium bg-indigo-50 text-indigo-700">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">🎯</span>
          Orçamento
        </a>
        <a href="/receita-futura" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">💰</span>
          Receita futura
        </a>
        <a href="/custos-fixos" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">📌</span>
          Custos fixos
        </a>
        <a href="/regras" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">⚙️</span>
          Regras
        </a>
      </nav>
    </aside>

    <!-- ── Page shell ───────────────────────────────────────────── -->
    <div class="ml-56 min-h-screen flex flex-col">

      <!-- Top bar -->
      <header class="bg-white border-b border-slate-200 px-8 h-16 flex items-center justify-between gap-4 shrink-0">
        <div class="min-w-0">
          <h1 class="text-lg font-bold text-slate-900">Orçamento mensal</h1>
          <p class="text-xs text-slate-500 truncate" id="subtitle">Carregando…</p>
        </div>
      </header>

      <!-- Toast -->
      <div
        id="toast"
        class="hidden fixed top-4 right-4 z-50 max-w-sm rounded-xl text-white text-sm px-4 py-3 shadow-lg"
      ></div>

      <!-- Content -->
      <main class="flex-1 px-8 py-6">

        <!-- ── Hero: month navigation + summary ────────────────── -->
        <section class="rounded-2xl overflow-hidden mb-6 shadow-md">
          <div class="bg-gradient-to-br from-indigo-600 to-indigo-700 px-8 pt-6 pb-8">

            <!-- Month navigation -->
            <div class="flex items-center gap-3 mb-6">
              <button
                id="prev-month"
                class="size-9 rounded-lg bg-white/15 hover:bg-white/25 disabled:opacity-40 disabled:cursor-not-allowed inline-flex items-center justify-center text-white transition-colors"
                title="Mês anterior"
                aria-label="Mês anterior"
              >
                <svg xmlns="http://www.w3.org/2000/svg" class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.25">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                </svg>
              </button>
              <span id="month-pill" class="text-xl font-bold text-white tracking-tight">—</span>
              <button
                id="next-month"
                class="size-9 rounded-lg bg-white/15 hover:bg-white/25 disabled:opacity-40 disabled:cursor-not-allowed inline-flex items-center justify-center text-white transition-colors"
                title="Próximo mês"
                aria-label="Próximo mês"
              >
                <svg xmlns="http://www.w3.org/2000/svg" class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.25">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                </svg>
              </button>
              <button
                id="current-month"
                class="h-9 rounded-lg bg-white/15 hover:bg-white/25 px-3 text-sm font-medium text-white/90 hover:text-white transition-colors"
              >
                Mês atual
              </button>
            </div>

            <!-- Summary (hidden when no categories have budgets) -->
            <div id="summary" class="hidden">
              <p class="text-xs font-semibold text-indigo-300 uppercase tracking-widest mb-1">Projetado / Meta</p>
              <div class="flex items-end justify-between gap-4 mb-3">
                <p class="text-4xl font-bold tabular text-white tracking-tight" id="summary-text">—</p>
                <p class="text-2xl font-bold tabular text-white/90 pb-0.5" id="summary-pct">—</p>
              </div>
              <div class="h-3 rounded-full overflow-hidden bg-white/20 mb-3">
                <div id="summary-bar" class="bar h-full rounded-full" style="width:0%"></div>
              </div>
              <p class="text-sm text-indigo-200" id="summary-detail">—</p>
            </div>

          </div>
        </section>

        <!-- ── Category cards grid ──────────────────────────────── -->
        <div id="cards" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

        <!-- Empty state -->
        <div id="empty" class="hidden text-center py-16">
          <p class="text-slate-500">Nenhuma categoria encontrada.</p>
          <p class="text-sm text-slate-400 mt-1">
            Rode <code class="bg-slate-200 rounded px-1.5 py-0.5">seed_categories.py</code> antes.
          </p>
        </div>

      </main>
    </div>

    <!-- ── Edit budget modal ────────────────────────────────────── -->
    <div
      id="edit-modal"
      class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40"
    >
      <div
        class="bg-white rounded-2xl shadow-2xl max-w-sm w-full"
        role="dialog"
        aria-modal="true"
      >
        <header class="flex items-center justify-between p-6 pb-3 border-b border-slate-100">
          <div class="flex items-center gap-2 min-w-0">
            <span id="modal-color" class="inline-block size-3 rounded-full shrink-0"></span>
            <h2 id="modal-title" class="text-lg font-semibold text-slate-900 truncate"></h2>
          </div>
          <button id="modal-close" class="text-slate-400 hover:text-slate-900" aria-label="Fechar">
            <svg xmlns="http://www.w3.org/2000/svg" class="size-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </header>
        <form id="modal-form" class="p-6 space-y-4">
          <div>
            <label for="modal-target" class="block text-xs uppercase tracking-wider text-slate-500 font-medium mb-1.5">
              Meta mensal (R$)
            </label>
            <input
              id="modal-target"
              type="text"
              inputmode="decimal"
              required
              class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 tabular"
              placeholder="0,00"
            />
            <p class="text-xs text-slate-400 mt-1.5" id="modal-hint">
              Use valores maiores que zero. Ex.: 450,00.
            </p>
          </div>
          <fieldset class="space-y-2">
            <legend class="block text-xs uppercase tracking-wider text-slate-500 font-medium mb-1.5">
              Aplicar meta
            </legend>
            <label class="flex items-center gap-2 text-sm text-slate-700">
              <input
                type="radio"
                name="target-scope"
                value="month"
                class="size-4 text-indigo-600 focus:ring-indigo-500"
                checked
              />
              <span id="scope-month-label">Apenas neste mês</span>
            </label>
            <label class="flex items-center gap-2 text-sm text-slate-700">
              <input
                type="radio"
                name="target-scope"
                value="default"
                class="size-4 text-indigo-600 focus:ring-indigo-500"
              />
              <span>Meta padrão para todos os meses</span>
            </label>
          </fieldset>
          <div class="flex items-center justify-between gap-3 pt-2">
            <button
              type="button"
              id="modal-delete"
              class="text-sm font-medium text-red-600 hover:text-red-700 hidden"
            >
              Remover meta
            </button>
            <div class="flex-1"></div>
            <button
              type="button"
              id="modal-cancel"
              class="text-sm font-medium text-slate-600 hover:text-slate-900 px-3 py-2"
            >
              Cancelar
            </button>
            <button
              type="submit"
              class="text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg shadow-sm"
            >
              Salvar
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="/static/orcamento.js?v=3"></script>
  </body>
</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Orçamento · OpenFinance</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%AF%3C/text%3E%3C/svg%3E" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <style>
      body {
        font-feature-settings: 'cv11', 'ss01';
        -webkit-font-smoothing: antialiased;
      }
      .tabular {
        font-variant-numeric: tabular-nums;
      }
      .bar {
        transition: width 0.4s ease;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans">
    <div class="mx-auto max-w-3xl px-6 py-10">
      <header class="mb-10">
        <nav class="flex items-center gap-4 text-sm mb-3">
          <a href="/" class="text-slate-500 hover:text-slate-900">Dashboard</a>
          <span class="text-slate-300">/</span>
          <a href="/historico" class="text-slate-500 hover:text-slate-900">Histórico</a>
          <span class="text-slate-300">/</span>
          <a href="/proximos" class="text-slate-500 hover:text-slate-900">Próximos</a>
          <span class="text-slate-300">/</span>
          <span class="text-slate-900 font-medium">Orçamento</span>
        </nav>
        <h1 class="text-3xl font-bold tracking-tight">Orçamento mensal</h1>
        <p class="text-sm text-slate-500 mt-1" id="subtitle">Carregando…</p>
      </header>

      <div
        id="toast"
        class="hidden fixed top-6 right-6 z-50 max-w-sm rounded-xl bg-slate-900 text-white text-sm px-4 py-3 shadow-lg"
      ></div>

      <section class="flex flex-wrap items-center gap-2 mb-6">
        <button
          id="prev-month"
          class="size-9 rounded-lg border border-slate-200 bg-white text-slate-600 hover:bg-slate-100 inline-flex items-center justify-center"
          title="Mês anterior"
          aria-label="Mês anterior"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.25">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
          </svg>
        </button>
        <div
          id="month-pill"
          class="h-9 rounded-lg border border-slate-200 bg-white px-4 inline-flex items-center text-sm font-medium text-slate-900 tabular"
        >
          —
        </div>
        <button
          id="next-month"
          class="size-9 rounded-lg border border-slate-200 bg-white text-slate-600 hover:bg-slate-100 inline-flex items-center justify-center"
          title="Próximo mês"
          aria-label="Próximo mês"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.25">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </button>
        <button
          id="current-month"
          class="h-9 rounded-lg border border-slate-200 bg-white px-3 text-sm font-medium text-slate-600 hover:bg-slate-100"
        >
          Mês atual
        </button>
      </section>

      <section
        id="summary"
        class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm mb-6 hidden"
      >
        <div class="flex items-baseline justify-between mb-2">
          <p class="text-xs uppercase tracking-wider text-slate-500 font-medium">Projetado / Meta</p>
          <p class="text-sm tabular text-slate-500" id="summary-pct">—</p>
        </div>
        <p class="text-2xl font-bold tabular mb-3" id="summary-text">—</p>
        <p class="text-xs text-slate-500 tabular mb-3" id="summary-detail">—</p>
        <div class="h-2 rounded-full bg-slate-100 overflow-hidden">
          <div id="summary-bar" class="bar h-full bg-indigo-600" style="width:0%"></div>
        </div>
      </section>

      <section id="cards" class="space-y-3"></section>

      <div id="empty" class="hidden text-center py-16">
        <p class="text-slate-500">Nenhuma categoria encontrada.</p>
        <p class="text-sm text-slate-400 mt-1">
          Rode <code class="bg-slate-200 rounded px-1.5 py-0.5">seed_categories.py</code> antes.
        </p>
      </div>
    </div>

    <div
      id="edit-modal"
      class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40"
    >
      <div
        class="bg-white rounded-2xl shadow-2xl max-w-sm w-full"
        role="dialog"
        aria-modal="true"
      >
        <header class="flex items-center justify-between p-6 pb-3 border-b border-slate-100">
          <div class="flex items-center gap-2 min-w-0">
            <span id="modal-color" class="inline-block size-3 rounded-full shrink-0"></span>
            <h2 id="modal-title" class="text-lg font-semibold text-slate-900 truncate"></h2>
          </div>
          <button id="modal-close" class="text-slate-400 hover:text-slate-900" aria-label="Fechar">
            <svg xmlns="http://www.w3.org/2000/svg" class="size-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </header>
        <form id="modal-form" class="p-6 space-y-4">
          <div>
            <label for="modal-target" class="block text-xs uppercase tracking-wider text-slate-500 font-medium mb-1.5">
              Meta mensal (R$)
            </label>
            <input
              id="modal-target"
              type="text"
              inputmode="decimal"
              required
              class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 tabular"
              placeholder="0,00"
            />
            <p class="text-xs text-slate-400 mt-1.5" id="modal-hint">
              Use valores maiores que zero. Ex.: 450,00.
            </p>
          </div>
          <fieldset class="space-y-2">
            <legend class="block text-xs uppercase tracking-wider text-slate-500 font-medium mb-1.5">
              Aplicar meta
            </legend>
            <label class="flex items-center gap-2 text-sm text-slate-700">
              <input
                type="radio"
                name="target-scope"
                value="month"
                class="size-4 text-indigo-600 focus:ring-indigo-500"
                checked
              />
              <span id="scope-month-label">Apenas neste mês</span>
            </label>
            <label class="flex items-center gap-2 text-sm text-slate-700">
              <input
                type="radio"
                name="target-scope"
                value="default"
                class="size-4 text-indigo-600 focus:ring-indigo-500"
              />
              <span>Meta padrão para todos os meses</span>
            </label>
          </fieldset>
          <div class="flex items-center justify-between gap-3 pt-2">
            <button
              type="button"
              id="modal-delete"
              class="text-sm font-medium text-red-600 hover:text-red-700 hidden"
            >
              Remover meta
            </button>
            <div class="flex-1"></div>
            <button
              type="button"
              id="modal-cancel"
              class="text-sm font-medium text-slate-600 hover:text-slate-900 px-3 py-2"
            >
              Cancelar
            </button>
            <button
              type="submit"
              class="text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg shadow-sm"
            >
              Salvar
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="/static/orcamento.js"></script>
  </body>
</html>

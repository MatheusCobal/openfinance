<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Overview · OpenFinance</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%B3%3C/text%3E%3C/svg%3E" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.pluggy.ai/pluggy-connect/latest/pluggy-connect.js"></script>
    <script>
      tailwind.config = {
        theme: { extend: { fontFamily: { sans: ['Inter','ui-sans-serif','system-ui','sans-serif'] } } }
      };
    </script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <style>
      body { font-feature-settings:'cv11','ss01'; -webkit-font-smoothing:antialiased; }
      .tabular { font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans min-h-screen" style="color-scheme:light">

    <!-- ── Sidebar ──────────────────────────────────────────────── -->
    <aside class="fixed inset-y-0 left-0 w-56 bg-white border-r border-slate-200 flex flex-col z-30">
      <div class="px-5 h-16 flex items-center border-b border-slate-100 shrink-0">
        <a href="/" class="flex items-center gap-3 min-w-0">
          <span class="size-8 bg-indigo-600 rounded-xl flex items-center justify-center text-white text-base select-none shrink-0">💳</span>
          <span class="font-bold text-slate-900 text-sm truncate">OpenFinance</span>
        </a>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
        <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium bg-indigo-50 text-indigo-700">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">📊</span>
          Dashboard
        </a>
        <a href="/custos-fixos" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">📌</span>
          Planejamento
        </a>
        <a href="/proximos" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">📅</span>
          Próximos
        </a>
        <a href="/transacoes" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">💳</span>
          Transações
        </a>
        <a href="/historico" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">📚</span>
          Histórico
        </a>
        <a href="/regras" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <span class="size-5 inline-flex items-center justify-center text-lg leading-none">⚙️</span>
          Regras
        </a>
      </nav>
    </aside>

    <!-- ── Page shell (right of sidebar) ───────────────────────── -->
    <div class="ml-56 min-h-screen flex flex-col">

      <!-- Top bar -->
      <header class="bg-white border-b border-slate-200 px-8 h-16 flex items-center justify-between gap-4 shrink-0">
        <div class="min-w-0">
          <h1 class="text-lg font-bold text-slate-900">Overview</h1>
          <p class="text-xs text-slate-500 truncate" id="subtitle">Carregando…</p>
        </div>
        <div class="flex items-center gap-1.5 shrink-0">
          <button id="refresh"
            class="text-sm font-medium text-slate-600 hover:text-slate-900 inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg hover:bg-slate-100 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M20 20v-5h-5M5 9a8 8 0 0114-3M19 15a8 8 0 01-14 3" />
            </svg>
            Atualizar
          </button>
          <button id="connect"
            class="text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg px-4 py-1.5 inline-flex items-center gap-1.5 shadow-sm disabled:opacity-50 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
            </svg>
            Conectar banco
          </button>
        </div>
      </header>

      <!-- Toast -->
      <div id="toast" class="hidden fixed top-4 right-4 z-50 max-w-sm rounded-xl text-white text-sm px-4 py-3 shadow-xl"></div>

      <!-- Content -->
      <main class="flex-1 px-8 py-6">

        <!-- ── Sync health (only shown when something is wrong / running) ── -->
        <section id="sync-health" class="hidden mb-6"></section>

        <!-- ── Disponível para gastar (current-month planning) ─── -->
        <section id="planning-card" class="hidden mb-6"></section>

        <!-- ── Resumo do mês (entradas / saídas / a receber) ───── -->
        <section id="month-summary-section" class="hidden mb-6">
          <h2 class="font-semibold text-slate-900 mb-3">Resumo do mês</h2>
          <div id="month-summary-cards" class="grid grid-cols-1 md:grid-cols-3 gap-3"></div>
        </section>

        <!-- ── Fatura do cartão ─────────────────────────────────── -->
        <section id="invoice-card" class="hidden mb-6"></section>

        <!-- ── Pluggy snapshot (real balances/limits/investments) ── -->
        <section id="snapshot-section" class="hidden mb-6">
          <div class="flex items-baseline justify-between mb-3">
            <h2 class="font-semibold text-slate-900">Saldos &amp; investimentos</h2>
            <p class="text-xs text-slate-500">Dados diretos do banco (Pluggy)</p>
          </div>
          <div id="snapshot-cards" class="grid grid-cols-1 md:grid-cols-4 gap-3"></div>
        </section>

        <!-- ── Empty state (nothing synced yet) ────────────────── -->
        <div id="empty" class="hidden text-center py-20">
          <div class="inline-flex flex-col items-center max-w-sm">
            <div class="size-14 rounded-2xl bg-indigo-50 flex items-center justify-center mb-4">
              <svg xmlns="http://www.w3.org/2000/svg" class="size-7 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h.01M11 15h2M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
            </div>
            <p class="text-slate-900 font-semibold text-lg">Nada sincronizado ainda</p>
            <p class="text-sm text-slate-500 mt-2 leading-relaxed">
              Conecte seus bancos em <a href="https://meu.pluggy.ai" target="_blank" rel="noopener" class="text-indigo-600 hover:underline font-medium">meu.pluggy.ai</a> e clique em <span class="font-medium text-slate-700">"Conectar banco"</span>.
            </p>
          </div>
        </div>
      </main>
    </div>

    <script src="/static/dashboard.js?v=2"></script>
  </body>
</html>

name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  unittest:
    name: Lint, migrate, and test
    runs-on: ubuntu-latest
    env:
      PLUGGY_CLIENT_ID: fake-client-id
      PLUGGY_CLIENT_SECRET: fake-client-secret

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f pyproject.toml ]; then
            pip install -e ".[dev]"
          else
            echo "No requirements.txt or pyproject.toml found"
            exit 1
          fi

      - name: Ruff check
        run: |
          ruff check

      - name: Ruff format check
        run: |
          ruff format --check

      - name: Compile app and tests
        run: |
          python -m compileall app tests

      - name: Run tests
        run: |
          python -m unittest discover -s tests

      - name: Run pytest
        run: |
          python -m pytest

      - name: Alembic upgrade head
        env:
          DATABASE_URL: sqlite:///${{ runner.temp }}/openfinance-ci.db
        run: |
          alembic upgrade head

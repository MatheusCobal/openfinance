<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OpenFinance · Cockpit — Redesign</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="tw.css" />

<style>
  html, body { margin: 0; padding: 0; }
  .ofx { font-family: "Inter", ui-sans-serif, system-ui, sans-serif; font-feature-settings: "cv11","ss01"; -webkit-font-smoothing: antialiased; }
  .tabular { font-variant-numeric: tabular-nums; }

  .cockpit-surface {
    background:
      radial-gradient(1200px 380px at 85% -40%, rgba(37,99,235,0.22), transparent 60%),
      radial-gradient(800px 300px at -10% 120%, rgba(16,185,129,0.10), transparent 55%),
      linear-gradient(140deg, #0b1220 0%, #101a2e 55%, #0b1220 100%);
  }
  .cockpit-grid {
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 28px 28px;
  }

  /* Entrance animations — visible end-state is the base; we animate from hidden. */
  @media (prefers-reduced-motion: no-preference) {
    .ofx-rise { animation: ofxRise .55s cubic-bezier(0.22,1,0.36,1) both; }
    .ofx-fade { animation: ofxFade .5s ease both; }
    .ofx-grow { animation: ofxGrow .7s cubic-bezier(0.22,1,0.36,1) both; }
  }
  /* Motion never hides content: worst case (animation suspended) the element
     rests a few px offset but fully visible. */
  @keyframes ofxRise { from { transform: translateY(12px); } to { transform: none; } }
  @keyframes ofxFade { from { transform: translateY(4px); } to { transform: none; } }
  @keyframes ofxGrow { from { transform: scaleX(0); } to { transform: scaleX(1); } }

  .bar-fill { transition: width 0.9s cubic-bezier(0.22,1,0.36,1); }
  .ring-anim { transition: stroke-dashoffset 1.1s cubic-bezier(0.22,1,0.36,1); }

  /* tidy scrollbars within nested scrollers */
  .ofx ::-webkit-scrollbar { height: 6px; width: 6px; }
  .ofx ::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.35); border-radius: 999px; }
</style>
</head>
<body class="ofx">
<div id="root"></div>
